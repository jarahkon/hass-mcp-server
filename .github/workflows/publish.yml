name: Publish

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npx eslint src/
      - run: npx tsc --noEmit
      - run: npx vitest run
      - run: npx tsc
      - run: npm publish --provenance --access public

  publish-vscode:
    runs-on: ubuntu-latest
    needs: publish-npm
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - run: npm install -g @vscode/vsce

      - name: Publish to VS Code Marketplace
        working-directory: vscode-extension
        run: vsce publish --tags mcp mcp-server home-assistant
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
